name: Spring Boot CI/CD Pipeline

# Kích hoạt action khi có code push lên nhánh 'cicd' hoặc 'main'
on:
  push:
    branches: [ "main"]

jobs:

  build-and-push-docker:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Sẽ tự động tìm file package-lock.json để cache
          cache-dependency-path: './package-lock.json'
      
      - name: 3. Install dependencies
        run: npm ci

      - name: 4. Build FE
        run: npm run build

      - name: 5. Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 6. Build và Push Docker Image lên Docker Hub
        run: |
          # Lấy 7 ký tự đầu tiên của mã Git Commit
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          # Định nghĩa tên image gốc
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/my-portfolio
          
          echo "Đang build version FE: $SHORT_SHA"
          
          # Build image và đánh 2 tag: Cụ thể (Short SHA) và Latest
          docker build -t $IMAGE_NAME:$SHORT_SHA -t $IMAGE_NAME:latest .
          
          # Push cả 2 tag lên Docker Hub
          docker push $IMAGE_NAME:$SHORT_SHA
          docker push $IMAGE_NAME:latest
